# -------------------------------------------------------------------
repos:
  # 5GMS
  S1:
    category: "5gms"
    repo_slug: "rt-5gms-application"
    display_name: "5GMS-Aware Application"
    description: "Reference implementation for 5GMS media streaming. Includes a 5GMSd-Aware Android app for playback via the Media Stream Handler and an Exo DVB-I Player for service selection."
    repo_url: "https://github.com/5G-MAG/rt-5gms-application"
    branch: "main"
    license: "Multiple"
    standards: ["3GPP"]
    software: ["APK", "Android"]
    public: true
  S2:
    category: "5gms"
    repo_slug: "rt-5gms-media-session-handler"
    display_name: "5GMS Media Session Handler"
    description: "A 5GMS Client component managing media sessions as defined in ETSI TS 126.501. It handles control plane interaction between the application and the 5GMS AF."
