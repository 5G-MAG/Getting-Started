      This repository holds an MBMS Middleware to provide the best available content to the application. If available, it combines content from (mobile) broadband, WiFi with the 5G broadcast content from the MBMS Modem using an advanced decision logic. The content is presented to apps via HTTP. It also implements a ROUTE client.
