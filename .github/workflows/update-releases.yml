name: Sync Repo Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Data
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import urllib.request
          import urllib.error
          import json
          import os
          import time
          from datetime import datetime

          # 1. Configuration
          standard_projects = {
              "5G Media Streaming": ["5G-MAG/rt-5gms-application-provider", "5G-MAG/rt-5gms-application", "5G-MAG/rt-5gms-application-function", "5G-MAG/rt-5gms-application-server", "5G-MAG/rt-5gms-media-stream-handler", "5G-MAG/rt-5gms-media-session-handler", "5G-MAG/rt-5gms-common-android-library", "5G-MAG/rt-5gms-examples"],
              "5G Core Service Consumers": ["5G-MAG/rt-5gc-service-consumers"],
              "UE Data Collection": ["5G-MAG/rt-data-collection-application-function"],
              "5G Broadcast TV Radio": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd", "5G-MAG/rt-mbms-tx", "5G-MAG/rt-mbms-mw-android", "5G-MAG/rt-mbms-mw", "5G-MAG/rt-mbms-modem", "5G-MAG/rt-wui", "5G-MAG/rt-mbms-examples"],
              "XR Media": ["5G-MAG/rt-xr-unity-player", "5G-MAG/rt-xr-content", "5G-MAG/rt-xr-blender-exporter"],
              "V3C Immersive": ["5G-MAG/rt-v3c-unity-player", "5G-MAG/rt-v3c-decoder-plugin", "5G-MAG/rt-v3c-content"],
              "Beyond 2D": ["5G-MAG/rt-beyond2d-evaluation-framework"],
              "AI ML": ["5G-MAG/rt-ai-ml-evaluation-framework"],
              "Multimedia Protocols": ["5G-MAG/rt-libflute"],
              "Auxiliary Tools": ["5G-MAG/rt-common-shared"],
              "Conversational Avatar": ["5G-MAG/rt-avatar-content", "5G-MAG/rt-avatar-call", "5G-MAG/rt-avatar-unity-tracker"],
              "6G Testbed": ["5G-MAG/6G-Testbed"],
              "DVB-I over 5G": ["5G-MAG/rt-5gms-application"]
          }

          filtered_projects = {
              "5G Broadcast Emergency Alerts": {"repos": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd"], "filter": "-ea-"},
              "5G Multicast Broadcast": {"repos": ["5G-MAG/rt-mbs-function","5G-MAG/rt-mbs-transport-function", "5G-MAG/open5gs", "5G-MAG/rt-srsRAN_Project", "5G-MAG/rt-mbs-examples"], "filter": "5mbs"}
          }

          def get_json(url):
              token = os.environ.get("GITHUB_TOKEN")
              req = urllib.request.Request(url)
              req.add_header('User-Agent', 'Github-Action-Bot')
              if token:
                  req.add_header('Authorization', f'token {token}')
              try:
                  # Small pause before each request to respect secondary rate limits
                  time.sleep(0.5)
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except urllib.error.HTTPError as e:
                  print(f"HTTP Error {e.code} for {url}")
                  if e.code == 403:
                      print("Potential Rate Limit reached. Waiting 2 seconds...")
                      time.sleep(2)
                  return None
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          # Load existing data for persistence
          existing_comm_data = {}
          if os.path.exists('_data/community_stats.json'):
              try:
                  with open('_data/community_stats.json', 'r') as f:
                      old_data = json.load(f)
                      for group in old_data.get("projects", {}).values():
                          for item in group:
                              existing_comm_data[item['name']] = item
              except Exception as e:
                  print(f"Could not read existing data: {e}")

          rel_out, pr_out, comm_out = {}, {}, {}
          all_groups = list(standard_projects.items()) + [(k, v['repos']) for k, v in filtered_projects.items()]

          for p_name, repos in all_groups:
              rel_list, pull_list, comm_list = [], [], []
              for repo in repos:
                  print(f"Processing {repo}...")
                  repo_data = get_json(f"https://api.github.com/repos/{repo}")
                  if not repo_data: continue
                  
                  repo_name = repo.split('/')[-1]
                  
                  # Traffic API
                  views_data = get_json(f"https://api.github.com/repos/{repo}/traffic/views")
                  clones_data = get_json(f"https://api.github.com/repos/{repo}/traffic/clones")
                  
                  current_views = views_data.get('count', 0) if views_data else 0
                  current_clones = clones_data.get('count', 0) if clones_data else 0

                  # Persistence Logic
                  prev_total_views = existing_comm_data.get(repo_name, {}).get('total_views', 0)
                  prev_total_clones = existing_comm_data.get(repo_name, {}).get('total_clones', 0)
                  new_day_views = views_data.get('views', [])[-1].get('count', 0) if (views_data and views_data.get('views')) else 0
                  new_day_clones = clones_data.get('clones', [])[-1].get('count', 0) if (clones_data and clones_data.get('clones')) else 0

                  # Activity Status
                  last_push = repo_data.get('pushed_at', '').split('T')[0]
                  days_delta = (datetime.now() - datetime.strptime(last_push, "%Y-%m-%d")).days
                  status = "Active" if days_delta <= 30 else "Maintenance" if days_delta <= 90 else "Stable"

                  comm_list.append({
                      "name": repo_name,
                      "stars": repo_data.get('stargazers_count', 0),
                      "forks": repo_data.get('forks_count', 0),
                      "issues": repo_data.get('open_issues_count', 0),
                      "views_14d": current_views,
                      "clones_14d": current_clones,
                      "total_views": prev_total_views + new_day_views,
                      "total_clones": prev_total_clones + new_day_clones,
                      "status": status,
                      "repo_url": f"https://github.com/{repo}"
                  })

                  # Releases
                  all_rels = get_json(f"https://api.github.com/repos/{repo}/releases") or []
                  f_tag = filtered_projects[p_name]['filter'].lower() if p_name in filtered_projects else ""
                  if f_tag:
                      target = next((r for r in all_rels if f_tag in r.get('tag_name', '').lower()), None)
                  else:
                      target = next((r for r in all_rels if not r.get('prerelease')), None) or (all_rels[0] if all_rels else None)
                  
                  rel_list.append({
                      "short_name": repo_name,
                      "tag": target.get('tag_name') if target else "No Release",
                      "date": target.get('published_at', '').split('T')[0] if target else "-",
                      "url": target.get('html_url') if target else f"https://github.com/{repo}/releases",
                      "repo_url": f"https://github.com/{repo}"
                  })
                  
                  # PRs
                  prs = get_json(f"https://api.github.com/repos/{repo}/pulls?state=open") or []
                  for pr in prs:
                      created_date = pr.get('created_at', '').split('T')[0]
                      pull_list.append({
                          "repo": repo_name,
                          "title": pr.get('title'),
                          "url": pr.get('html_url'),
                          "user": pr.get('user', {}).get('login'),
                          "date": created_date,
                          "days_ago": (datetime.now() - datetime.strptime(created_date, "%Y-%m-%d")).days
                      })

              rel_out[p_name], pr_out[p_name], comm_out[p_name] = rel_list, pull_list, comm_list

          # Save Output
          if not os.path.exists('_data'): os.makedirs('_data')
          timestamp = datetime.now().strftime("%Y-%m-%d %H:%M")
          for name, data in [('releases', rel_out), ('pull_requests', pr_out), ('community_stats', comm_out)]:
              with open(f'_data/{name}.json', 'w') as f:
                  json.dump({"last_updated": timestamp, "projects": data}, f, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/*.json
          git commit -m "Dashboard Update: Rate Limit Handling & PR Dates" || exit 0
          git push
