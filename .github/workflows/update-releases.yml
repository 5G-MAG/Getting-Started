name: Sync Repo Releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Latest Releases
        run: |
          python - <<EOF
          import urllib.request
          import json
          import os
          from datetime import datetime

          # LIST YOUR REPOS HERE
          repos = [
              "google/gson",
              "facebook/react",
              "microsoft/vscode"
          ]

          repo_data = []
          for repo in repos:
              print(f"Fetching {repo}...")
              url = f"https://api.github.com/repos/{repo}/releases/latest"
              # GitHub API requires a User-Agent header
              req = urllib.request.Request(url, headers={'User-Agent': 'Github-Action-Bot'})
              
              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
                      repo_data.append({
                          "name": repo,
                          "tag": data['tag_name'],
                          "url": data['html_url']
                      })
              except Exception as e:
                  print(f"Failed to fetch {repo}: {e}")

          output = {
              "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M:%S"),
              "releases": repo_data
          }
          
          if not os.path.exists('_data'):
              os.makedirs('_data')

          with open('_data/releases.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/releases.json
          git commit -m "Auto-update release tags" || exit 0
          git push
