name: Sync Repo Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use your PAT here so the push triggers the Jekyll build
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Data
        env:
          # Use the PAT for API calls to avoid Organization rate limits
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          # ... (Your Python code remains exactly the same)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/*.json
          # Only push if data actually changed
          if ! git diff --cached --quiet; then
            git commit -m "Update Data (including repo_url for separate linking)"
            git push
          else
            echo "No changes detected."
          fi
