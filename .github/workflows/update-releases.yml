name: Sync Repo Releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Latest Releases
        run: |
          python - <<EOF
          import urllib.request
          import json
          import os
          from datetime import datetime

          # 1. Projects fetching the absolute global Latest Release
          standard_projects = {
              "5G Media Streaming": ["5G-MAG/rt-5gms-application-provider", "5G-MAG/rt-5gms-application", "5G-MAG/rt-5gms-application-function", "5G-MAG/rt-5gms-application-server", "5G-MAG/rt-5gms-media-stream-handler", "5G-MAG/rt-5gms-media-session-handler", "5G-MAG/rt-5gms-common-android-library", "5G-MAG/rt-5gms-examples"],
              "5G Core Service Consumers": ["5G-MAG/rt-5gc-service-consumers"],
              "UE Data Collection": ["5G-MAG/rt-data-collection-application-function"],
              "5G Broadcast TV Radio": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd", "5G-MAG/rt-mbms-tx", "5G-MAG/rt-mbms-mw-android", "5G-MAG/rt-mbms-mw", "5G-MAG/rt-mbms-modem", "5G-MAG/rt-wui", "5G-MAG/rt-mbms-examples"],
              "XR Media": ["5G-MAG/rt-xr-unity-player", "5G-MAG/rt-xr-content", "5G-MAG/rt-xr-blender-exporter"],
              "V3C Immersive": ["5G-MAG/rt-v3c-unity-player", "5G-MAG/rt-v3c-decoder-plugin", "5G-MAG/rt-v3c-content"],
              "Beyond 2D": ["5G-MAG/rt-beyond2d-evaluation-framework"],
              "AI ML": ["5G-MAG/rt-ai-ml-evaluation-framework"],
              "Multimedia Protocols": ["5G-MAG/rt-libflute"],
              "Auxiliary Tools": ["5G-MAG/rt-common-shared"]
          }

          # 2. Projects requiring specific tag filters (Emergency Alerts & 5MBS)
          filtered_projects = {
              "5G Broadcast Emergency Alerts": {"repos": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd"], "filter": "-ea-"},
              "5G Multicast Broadcast": {"repos": ["5G-MAG/rt-mbs-transport-function", "5G-MAG/open5gs", "5G-MAG/rt-srsRAN_Project", "5G-MAG/rt-mbs-examples"], "filter": "5mbs"}
          }

          final_output = {}

          def get_json(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'Github-Action-Bot'})
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode())

          # Process Standard Projects
          for p_name, repos in standard_projects.items():
              data_list = []
              for repo in repos:
                  print(f"Fetching latest for {repo}...")
                  try:
                      data = get_json(f"https://api.github.com/repos/{repo}/releases/latest")
                      data_list.append({
                          "short_name": repo.split('/')[-1],
                          "tag": data.get('tag_name'),
                          "date": data.get('published_at', '').split('T')[0],
                          "url": data.get('html_url')
                      })
                  except:
                      data_list.append({"short_name": repo.split('/')[-1], "tag": "No Release", "date": "-", "url": f"https://github.com/{repo}/releases"})
              final_output[p_name] = data_list

          # Process Filtered Projects (EA and 5MBS)
          for p_name, config in filtered_projects.items():
              data_list = []
              for repo in config["repos"]:
                  print(f"Filtering {p_name} for {repo} using {config['filter']}...")
                  try:
                      releases = get_json(f"https://api.github.com/repos/{repo}/releases")
                      target = next((r for r in releases if config["filter"] in r.get('tag_name', '').lower()), None)
                      if target:
                          data_list.append({
                              "short_name": repo.split('/')[-1],
                              "tag": target.get('tag_name'),
                              "date": target.get('published_at', '').split('T')[0],
                              "url": target.get('html_url')
                          })
                      else:
                          # Fallback to latest if filter fails
                          latest = get_json(f"https://api.github.com/repos/{repo}/releases/latest")
                          data_list.append({"short_name": repo.split('/')[-1], "tag": latest.get('tag_name'), "date": latest.get('published_at', '').split('T')[0], "url": latest.get('html_url')})
                  except:
                      data_list.append({"short_name": repo.split('/')[-1], "tag": "No Release", "date": "-", "url": f"https://github.com/{repo}/releases"})
              final_output[p_name] = data_list

          # Save with timestamp
          full_data = {"last_updated": datetime.now().strftime("%Y-%m-%d"), "projects": final_output}
          
          if not os.path.exists('_data'): os.makedirs('_data')
          with open('_data/releases.json', 'w') as f:
              json.dump(full_data, f, indent=2)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/releases.json
          git commit -m "Auto-update release tags" || exit 0
          git push
