name: Sync Repo Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch and Sync Data
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import urllib.request
          import urllib.error
          import json
          import os
          import time
          import re
          from datetime import datetime

          # 1. Configuration
          standard_projects = {
              "5G Media Streaming": ["5G-MAG/rt-5gms-application-provider", "5G-MAG/rt-5gms-application", "5G-MAG/rt-5gms-application-function", "5G-MAG/rt-5gms-application-server", "5G-MAG/rt-5gms-media-stream-handler", "5G-MAG/rt-5gms-media-session-handler", "5G-MAG/rt-5gms-common-android-library", "5G-MAG/rt-5gms-examples"],
              "5G Core Service Consumers": ["5G-MAG/rt-5gc-service-consumers"],
              "UE Data Collection": ["5G-MAG/rt-data-collection-application-function"],
              "5G Broadcast TV Radio": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd", "5G-MAG/rt-mbms-tx", "5G-MAG/rt-mbms-mw-android", "5G-MAG/rt-mbms-mw", "5G-MAG/rt-mbms-modem", "5G-MAG/rt-wui", "5G-MAG/rt-mbms-examples"],
              "XR Media": ["5G-MAG/rt-xr-unity-player", "5G-MAG/rt-xr-content", "5G-MAG/rt-xr-blender-exporter"],
              "V3C Immersive": ["5G-MAG/rt-v3c-unity-player", "5G-MAG/rt-v3c-decoder-plugin", "5G-MAG/rt-v3c-content"],
              "Beyond 2D": ["5G-MAG/rt-beyond2d-evaluation-framework"],
              "AI ML": ["5G-MAG/rt-ai-ml-evaluation-framework"],
              "Multimedia Protocols": ["5G-MAG/rt-libflute"],
              "Auxiliary Tools": ["5G-MAG/rt-common-shared"],
              "Conversational Avatar": ["5G-MAG/rt-avatar-content", "5G-MAG/rt-avatar-call", "5G-MAG/rt-avatar-unity-tracker"],
              "6G Testbed": ["5G-MAG/6G-Testbed"],
              "DVB-I over 5G": ["5G-MAG/rt-5gms-application"]
          }

          filtered_projects = {
              "5G Broadcast Emergency Alerts": {"repos": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd"], "filter": "-ea-"},
              "5G Multicast Broadcast": {"repos": ["5G-MAG/rt-mbs-function","5G-MAG/rt-mbs-transport-function", "5G-MAG/open5gs", "5G-MAG/rt-srsRAN_Project", "5G-MAG/rt-mbs-examples"], "filter": "5mbs"}
          }

          def get_json(url):
              token = os.environ.get("GITHUB_TOKEN")
              req = urllib.request.Request(url)
              req.add_header('User-Agent', 'Github-Action-Bot')
              req.add_header('Accept', 'application/vnd.github+json')
              if token:
                  req.add_header('Authorization', f'Bearer {token}')
              try:
                  time.sleep(0.5)
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          repo_descriptions = {}
          all_groups = list(standard_projects.items()) + [(k, v['repos']) for k, v in filtered_projects.items()]

          for p_name, repos in all_groups:
              for repo in repos:
                  repo_data = get_json(f"https://api.github.com/repos/{repo}")
                  if repo_data and repo_data.get('description'):
                      repo_name = repo.split('/')[-1]
                      repo_descriptions[repo_name] = repo_data['description']

          # --- RECOVERY AND SAFE YAML UPDATE ---
          yaml_path = '_data/repo_metadata.yml'
          if os.path.exists(yaml_path):
              with open(yaml_path, 'r') as f:
                  lines = f.readlines()
              
              updated_lines = []
              active_slug = None
              for line in lines:
                  # 1. Improved Slug Detection: extracts the slug even if it's currently quoted or spaced
                  if 'repo_slug:' in line:
                      match = re.search(r'repo_slug:\s*["\']?([^"\s\n\']+)["\']?', line)
                      if match:
                          active_slug = match.group(1)
                  
                  # 2. Fix the description line
                  if 'description:' in line:
                      # Try to get fresh text from GitHub first
                      raw_text = repo_descriptions.get(active_slug)
                      
                      # Fallback: extract the current text between the outer quotes if GitHub is unreachable
                      if not raw_text:
                          match = re.search(r'description:\s*"(.*)"', line)
                          if match:
                              raw_text = match.group(1)
                      
                      if raw_text:
                          # SANITIZE: 
                          # - Replace existing backslashes first to avoid double-escaping
                          # - Escape all double quotes with backslashes
                          # - Replace any newlines with spaces
                          safe_text = raw_text.replace('\\"', '"').replace('"', '\\"').replace('\n', ' ').strip()
                          
                          # Maintain the original line's indentation
                          indent = line[:line.find('description:')]
                          line = f'{indent}description: "{safe_text}"\n'
                  
                  updated_lines.append(line)
              
              with open(yaml_path, 'w') as f:
                  f.writelines(updated_lines)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/repo_metadata.yml
          git commit -m "Dashboard: Sanitize YAML descriptions and escape quotes" || exit 0
          git push
